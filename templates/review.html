<!DOCTYPE html>
<html>
<head>
    <title>Review - {{ video_id }}</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #1a1a1a; color: #eee; }
        h1, h2 { color: #4af; }
        a { color: #4af; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .filters { margin-bottom: 15px; }
        .filters button { margin-right: 5px; padding: 5px 10px; cursor: pointer; }
        .filters button.active { background: #4af; color: #000; }
        .entry { border: 1px solid #444; padding: 15px; margin-bottom: 15px; display: flex; gap: 20px; }
        .entry.low-confidence { border-color: #f84; }
        .entry.reviewed { border-color: #4f4; opacity: 0.7; }
        .entry.deleted { border-color: #f44; opacity: 0.5; background: #2a1a1a; }
        .entry-frame { flex: 0 0 400px; }
        .entry-frame img { max-width: 100%; border: 1px solid #333; }
        .entry-content { flex: 1; }
        .entry-meta { color: #888; font-size: 12px; margin-bottom: 10px; }
        .field { margin-bottom: 10px; }
        .field label { display: block; color: #888; margin-bottom: 3px; }
        .field input, .field textarea { width: 100%; padding: 8px; background: #2a2a2a; border: 1px solid #444; color: #eee; font-family: monospace; }
        .field textarea { min-height: 80px; resize: vertical; }
        .actions { margin-top: 10px; }
        .actions button { margin-right: 5px; padding: 8px 15px; cursor: pointer; }
        .btn-approve { background: #4f4; color: #000; border: none; }
        .btn-save { background: #4af; color: #000; border: none; }
        .btn-delete { background: #f44; color: #fff; border: none; }
        .btn-restore { background: #4f4; color: #000; border: none; }
        .btn-skip { background: #666; color: #fff; border: none; }
        .keyboard-hint { color: #666; font-size: 11px; margin-top: 5px; }
        .stats { background: #2a2a2a; padding: 10px; margin-bottom: 15px; }
        .hidden { display: none !important; }
        .loading { text-align: center; padding: 20px; color: #888; }
        .load-sentinel { height: 1px; }
        .controls { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .controls label { color: #888; }
        .controls input[type="range"] { width: 150px; }
        .action-log { position: fixed; top: 20px; right: 20px; width: 320px; max-height: 60vh; background: #222; border: 1px solid #444; border-radius: 4px; z-index: 1000; display: flex; flex-direction: column; }
        .action-log-header { padding: 10px; background: #333; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        .action-log-header h3 { margin: 0; font-size: 14px; color: #4af; }
        .action-log-count { background: #4af; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .action-log-body { overflow-y: auto; flex: 1; max-height: 400px; }
        .action-log-empty { padding: 20px; text-align: center; color: #666; }
        .action-log-item { padding: 8px 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .action-log-item:hover { background: #2a2a2a; }
        .action-log-item .action-type { font-weight: bold; text-transform: uppercase; font-size: 11px; padding: 2px 6px; border-radius: 3px; }
        .action-log-item .action-type.approve { background: #4f4; color: #000; }
        .action-log-item .action-type.save { background: #4af; color: #000; }
        .action-log-item .action-type.delete { background: #f44; color: #fff; }
        .action-log-item .action-type.restore { background: #fa4; color: #000; }
        .action-log-item .action-info { flex: 1; font-size: 12px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .action-log-item .action-undo { background: #666; color: #fff; border: none; padding: 3px 8px; cursor: pointer; font-size: 11px; border-radius: 3px; }
        .action-log-item .action-undo:hover { background: #888; }
        .action-log-footer { padding: 10px; background: #333; border-top: 1px solid #444; display: flex; gap: 10px; }
        .action-log-footer button { flex: 1; padding: 8px; cursor: pointer; border: none; border-radius: 3px; font-weight: bold; }
        .btn-flush { background: #4f4; color: #000; }
        .btn-flush:hover { background: #6f6; }
        .btn-flush:disabled { background: #555; color: #888; cursor: not-allowed; }
        .btn-clear { background: #f44; color: #fff; }
        .btn-clear:hover { background: #f66; }
        .btn-clear:disabled { background: #555; color: #888; cursor: not-allowed; }
        .entry.pending-action { border-left: 3px solid #fa4; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>{{ metadata.get('chapter', video_id) }}</h1>
            <p><a href="/">← Back to Dashboard</a></p>
        </div>
        <div class="stats">
            <span id="stats-reviewed">0</span> / <span id="stats-total">{{ total_entries }}</span> reviewed
            | Low confidence: <span id="stats-low">0</span>
            | Showing: <span id="stats-loaded">0</span>
        </div>
    </div>
    
    <div class="filters">
        <button onclick="setFilter('all')" class="active" data-filter="all">All</button>
        <button onclick="setFilter('pending')" data-filter="pending">Pending</button>
        <button onclick="setFilter('low')" data-filter="low">Low Confidence</button>
        <button onclick="setFilter('reviewed')" data-filter="reviewed">Reviewed</button>
        <button onclick="setFilter('deleted')" data-filter="deleted">Deleted</button>
    </div>
    
    <div class="controls">
        <label>Frame size:</label>
        <input type="range" id="frame-size" min="20" max="50" value="30" oninput="setFrameSize(this.value)">
        <span id="frame-size-label">30%</span>
        
        <label style="margin-left: 20px;">Min confidence:</label>
        <input type="range" id="confidence-filter" min="0" max="100" value="0" oninput="setConfidenceFilter(this.value)">
        <span id="confidence-label">0%</span>
    </div>
    
    <div id="entries"></div>
    <div id="loading" class="loading hidden">Loading more entries...</div>
    <div id="load-sentinel" class="load-sentinel"></div>
    
    <div class="action-log" id="action-log">
        <div class="action-log-header">
            <h3>Action Log</h3>
            <span class="action-log-count" id="action-count">0</span>
        </div>
        <div class="action-log-body" id="action-log-body">
            <div class="action-log-empty">No pending actions</div>
        </div>
        <div class="action-log-footer">
            <button class="btn-flush" id="btn-flush" onclick="flushActions()" disabled>Flush All</button>
            <button class="btn-clear" id="btn-clear" onclick="clearActions()" disabled>Clear All</button>
        </div>
    </div>
    
    <script>
        const videoId = "{{ video_id }}";
        const BATCH_SIZE = 20;
        let currentFilter = "all";
        let currentOffset = 0;
        let isLoading = false;
        let hasMore = true;
        let totalFiltered = 0;
        let reviewedCount = 0;
        let lowCount = 0;
        let frameSize = 30;
        let minConfidence = 0;
        
        let actionLog = [];
        let actionIdCounter = 0;

        function setFrameSize(val) {
            frameSize = parseInt(val);
            document.getElementById('frame-size-label').textContent = val + '%';
            document.querySelectorAll('.entry-frame').forEach(el => {
                el.style.flex = `0 0 ${val}%`;
            });
        }

        function setConfidenceFilter(val) {
            minConfidence = parseInt(val) / 100;
            document.getElementById('confidence-label').textContent = val + '%';
            loadEntries(true);
        }
        
        function addAction(type, index, data = {}) {
            actionLog = actionLog.filter(a => a.index !== index);
            
            const entryEl = document.querySelector(`.entry[data-index="${index}"]`);
            const frameImg = entryEl ? entryEl.querySelector('.entry-frame img') : null;
            const frameName = frameImg ? frameImg.alt.replace('Frame ', '') : `#${index}`;
            
            const action = {
                id: ++actionIdCounter,
                type: type,
                index: index,
                frame: frameName,
                timestamp: Date.now(),
                ...data
            };
            actionLog.push(action);
            renderActionLog();
            
            const entry = entryEl;
            if (entry) {
                entry.classList.add('pending-action');
                if (type === 'approve') {
                    entry.classList.add('reviewed');
                    entry.dataset.reviewed = 'true';
                } else if (type === 'delete') {
                    entry.classList.add('deleted');
                    entry.dataset.deleted = 'true';
                } else if (type === 'restore') {
                    entry.classList.remove('deleted');
                    entry.dataset.deleted = 'false';
                } else if (type === 'save') {
                    entry.classList.add('reviewed');
                    entry.dataset.reviewed = 'true';
                }
            }
            updateStats();
        }
        
        function removeAction(actionId) {
            const action = actionLog.find(a => a.id === actionId);
            if (!action) return;
            
            const entry = document.querySelector(`.entry[data-index="${action.index}"]`);
            if (entry) {
                entry.classList.remove('pending-action');
                if (action.type === 'approve' || action.type === 'save') {
                    entry.classList.remove('reviewed');
                    entry.dataset.reviewed = 'false';
                } else if (action.type === 'delete') {
                    entry.classList.remove('deleted');
                    entry.dataset.deleted = 'false';
                } else if (action.type === 'restore') {
                    entry.classList.add('deleted');
                    entry.dataset.deleted = 'true';
                }
            }
            
            actionLog = actionLog.filter(a => a.id !== actionId);
            renderActionLog();
            updateStats();
        }
        
        function renderActionLog() {
            const body = document.getElementById('action-log-body');
            const count = document.getElementById('action-count');
            const btnFlush = document.getElementById('btn-flush');
            const btnClear = document.getElementById('btn-clear');
            
            count.textContent = actionLog.length;
            btnFlush.disabled = actionLog.length === 0;
            btnClear.disabled = actionLog.length === 0;
            
            body.innerHTML = '';
            
            if (actionLog.length === 0) {
                body.innerHTML = '<div class="action-log-empty">No pending actions</div>';
                return;
            }
            
            [...actionLog].reverse().forEach(action => {
                const item = document.createElement('div');
                item.className = 'action-log-item';
                item.dataset.actionId = action.id;
                
                let info = action.frame;
                if (action.type === 'save') {
                    info += ` - ${action.speaker || '(no speaker)'}`;
                }
                
                const typeSpan = document.createElement('span');
                typeSpan.className = `action-type ${action.type}`;
                typeSpan.textContent = action.type;
                
                const infoSpan = document.createElement('span');
                infoSpan.className = 'action-info';
                infoSpan.title = info;
                infoSpan.textContent = info;
                
                const undoBtn = document.createElement('button');
                undoBtn.className = 'action-undo';
                undoBtn.textContent = 'Undo';
                undoBtn.addEventListener('click', () => removeAction(action.id));
                
                item.appendChild(typeSpan);
                item.appendChild(infoSpan);
                item.appendChild(undoBtn);
                body.appendChild(item);
            });
        }
        
        async function flushActions() {
            if (actionLog.length === 0) return;
            
            const btnFlush = document.getElementById('btn-flush');
            btnFlush.disabled = true;
            btnFlush.textContent = 'Flushing...';
            
            try {
                const response = await fetch(`/video/${videoId}/flush`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({actions: actionLog})
                });
                
                if (response.ok) {
                    const result = await response.json();
                    document.querySelectorAll('.entry.pending-action').forEach(el => {
                        el.classList.remove('pending-action');
                    });
                    actionLog = [];
                    renderActionLog();
                    updateStats();
                } else {
                    alert('Error flushing actions');
                }
            } catch (error) {
                console.error('Error flushing actions:', error);
                alert('Error flushing actions');
            } finally {
                btnFlush.textContent = 'Flush All';
                btnFlush.disabled = actionLog.length === 0;
            }
        }
        
        function clearActions() {
            if (actionLog.length === 0) return;
            if (!confirm(`Clear ${actionLog.length} pending actions? This will undo all changes.`)) return;
            
            actionLog.forEach(action => {
                const entry = document.querySelector(`.entry[data-index="${action.index}"]`);
                if (entry) {
                    entry.classList.remove('pending-action');
                    if (action.type === 'approve' || action.type === 'save') {
                        entry.classList.remove('reviewed');
                        entry.dataset.reviewed = 'false';
                    } else if (action.type === 'delete') {
                        entry.classList.remove('deleted');
                        entry.dataset.deleted = 'false';
                    } else if (action.type === 'restore') {
                        entry.classList.add('deleted');
                        entry.dataset.deleted = 'true';
                    }
                }
            });
            
            actionLog = [];
            renderActionLog();
            updateStats();
        }

        function createEntryElement(entry) {
            const div = document.createElement('div');
            const isLow = entry.confidence < 0.8;
            const isReviewed = entry.reviewed === true;
            const isDeleted = entry.deleted === true;
            
            div.className = `entry${isLow ? ' low-confidence' : ''}${isReviewed ? ' reviewed' : ''}${isDeleted ? ' deleted' : ''}`;
            div.dataset.index = entry.index;
            div.dataset.confidence = entry.confidence;
            div.dataset.reviewed = isReviewed;
            div.dataset.deleted = isDeleted;
            
            div.innerHTML = `
                <div class="entry-frame">
                    <img src="/frame/${videoId}/${entry.frame}" alt="Frame ${entry.frame}" loading="lazy">
                </div>
                <div class="entry-content">
                    <div class="entry-meta">
                        Frame: ${entry.frame} | Timestamp: ${entry.timestamp}s | Confidence: ${entry.confidence.toFixed(2)}
                        ${entry.corrected ? ' | <span style="color:#f84">Corrected</span>' : ''}
                    </div>
                    <div class="field">
                        <label>Speaker</label>
                        <input type="text" class="speaker-input" value="${entry.speaker || ''}">
                    </div>
                    <div class="field">
                        <label>Dialogue</label>
                        <textarea class="dialogue-input">${entry.dialogue || ''}</textarea>
                    </div>
                    <div class="actions">
                        ${isDeleted ? `
                            <button class="btn-restore" onclick="restoreEntry(${entry.index})">Restore</button>
                        ` : `
                            <button class="btn-approve" onclick="approveEntry(${entry.index})">Approve (A)</button>
                            <button class="btn-save" onclick="saveEntry(${entry.index})">Save (S)</button>
                            <button class="btn-delete" onclick="deleteEntry(${entry.index})">Delete (D)</button>
                        `}
                    </div>
                    <div class="keyboard-hint">Use Tab to navigate, Enter to save</div>
                </div>
            `;
            
            return div;
        }

        async function loadEntries(reset = false) {
            if (isLoading || (!hasMore && !reset)) return;
            
            if (reset) {
                currentOffset = 0;
                hasMore = true;
                document.getElementById('entries').innerHTML = '';
            }
            
            isLoading = true;
            document.getElementById('loading').classList.remove('hidden');
            
            try {
                const response = await fetch(`/api/video/${videoId}/entries?offset=${currentOffset}&limit=${BATCH_SIZE}&filter=${currentFilter}&min_confidence=${minConfidence}`);
                const data = await response.json();
                
                const container = document.getElementById('entries');
                data.entries.forEach(entry => {
                    const el = createEntryElement(entry);
                    el.querySelector('.entry-frame').style.flex = `0 0 ${frameSize}%`;
                    container.appendChild(el);
                });
                
                currentOffset += data.entries.length;
                hasMore = data.has_more;
                totalFiltered = data.total;
                
                updateStats();
            } catch (error) {
                console.error('Error loading entries:', error);
            } finally {
                isLoading = false;
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function updateStats() {
            const entries = document.querySelectorAll('.entry');
            let reviewed = 0;
            let low = 0;
            
            entries.forEach(e => {
                if (e.dataset.reviewed === 'true') reviewed++;
                if (parseFloat(e.dataset.confidence) < 0.8) low++;
            });
            
            document.getElementById('stats-total').textContent = totalFiltered;
            document.getElementById('stats-reviewed').textContent = reviewed;
            document.getElementById('stats-low').textContent = low;
            document.getElementById('stats-loaded').textContent = entries.length;
        }
        
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filters button').forEach(b => {
                b.classList.toggle('active', b.dataset.filter === filter);
            });
            loadEntries(true);
        }
        
        function approveEntry(index) {
            addAction('approve', index);
            focusNext(index);
        }
        
        function saveEntry(index) {
            const entry = document.querySelector(`.entry[data-index="${index}"]`);
            const speaker = entry.querySelector('.speaker-input').value;
            const dialogue = entry.querySelector('.dialogue-input').value;
            addAction('save', index, {speaker, dialogue});
            focusNext(index);
        }
        
        function deleteEntry(index) {
            addAction('delete', index);
        }
        
        function restoreEntry(index) {
            addAction('restore', index);
        }
        
        function focusNext(currentIndex) {
            const entries = Array.from(document.querySelectorAll('.entry'));
            const currentEntry = document.querySelector(`.entry[data-index="${currentIndex}"]`);
            const currentPos = entries.indexOf(currentEntry);
            
            if (currentPos < entries.length - 1) {
                entries[currentPos + 1].querySelector('.speaker-input').focus();
                entries[currentPos + 1].scrollIntoView({behavior: 'smooth', block: 'center'});
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                const entry = e.target.closest('.entry');
                const index = parseInt(entry.dataset.index);
                
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    saveEntry(index);
                }
            }
            
            if (e.key === 'a' && !e.target.matches('input, textarea')) {
                const visible = document.querySelectorAll('.entry');
                if (visible.length > 0) {
                    const index = parseInt(visible[0].dataset.index);
                    approveEntry(index);
                }
            }
        });

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && hasMore && !isLoading) {
                loadEntries();
            }
        }, { rootMargin: '200px' });
        
        observer.observe(document.getElementById('load-sentinel'));
        
        loadEntries();
    </script>
</body>
</html>
